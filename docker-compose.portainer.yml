# Стек для Portainer: готовые образы из GHCR (собираются GitHub Actions).
# Схема сетей: наружу смотрит только frontend (в общей сети с Nginx Proxy Manager),
# db/backend/bot изолированы во внутренней сети без публикации портов.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gambit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gambit}
      POSTGRES_DB: ${POSTGRES_DB:-gambit}
    volumes:
      - gambit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gambit}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gambit_internal

  backend:
    image: ghcr.io/${IMAGE_OWNER}/gambit-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gambit}:${POSTGRES_PASSWORD:-gambit}@db:5432/${POSTGRES_DB:-gambit}
      MASTER_PASSWORD: ${MASTER_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost"]}'
    volumes:
      - gambit_uploads:/data/uploads
    networks:
      - gambit_internal

  bot:
    image: ghcr.io/${IMAGE_OWNER}/gambit-bot:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      API_BASE: http://backend:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      BOT_POLL_SECONDS: ${BOT_POLL_SECONDS:-15}
    networks:
      - gambit_internal

  frontend:
    image: ghcr.io/${IMAGE_OWNER}/gambit-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # Явное имя — по нему Nginx Proxy Manager будет проксировать (Forward Hostname).
    container_name: gambit-frontend
    depends_on:
      - backend
    networks:
      # web_network — чтобы NPM достучался; gambit_internal — чтобы nginx достучался до backend.
      - web_network
      - gambit_internal
    # Порт наружу не публикуем: трафик идёт через NPM.
    # Для отладки без NPM можно временно раскомментировать:
    # ports:
    #   - "${FRONTEND_PORT:-8080}:80"

networks:
  web_network:
    external: true
    # Если реальное имя сети отличается (проверьте: docker network ls),
    # укажите его явно, напр.:
    # name: npm_web_network
  gambit_internal:
    driver: bridge
    # ВАЖНО: не ставить internal: true — боту нужен выход в интернет к Discord API.

volumes:
  gambit_pgdata:
  gambit_uploads:
